<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with gradient -->
  <rect width="100" height="100" rx="22" fill="url(#grad)" />
  
  <!-- Resume Document -->
  <rect x="25" y="18" width="50" height="64" rx="6" fill="#FFFFFF" shadow="0 4px 6px rgba(0,0,0,0.1)" />
  <rect x="35" y="30" width="30" height="5" rx="2.5" fill="#CBD5E1" />
  <rect x="35" y="42" width="24" height="5" rx="2.5" fill="#CBD5E1" />
  <rect x="35" y="54" width="30" height="5" rx="2.5" fill="#CBD5E1" />
  <rect x="35" y="66" width="16" height="5" rx="2.5" fill="#CBD5E1" />
  
  <!-- Magnifying Glass for Insights -->
  <circle cx="70" cy="70" r="14" fill="#FFFFFF" stroke="#4F46E5" stroke-width="4" />
  <line x1="80" y1="80" x2="90" y2="90" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
</svg>
